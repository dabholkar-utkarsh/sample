[build]
builder = "nixpacks"
buildCommand = "corepack enable && pnpm install --frozen-lockfile=false && pnpm db:generate && pnpm --filter @repo/database build && pnpm --filter @repo/api build"

[deploy]
startCommand = "node apps/api/dist/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 300
